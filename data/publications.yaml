- id: zhang2024modeling
  title: "Modeling other players with bayesian beliefs for games with incomplete information"
  year: 2025
  type: conference
  author:
    - family: Zhang
      given: Zuyuan
    - family: Imani
      given: Mahdi 
    - family: Lan
      given: Tian
  booktitle: arXiv preprint
  venueShort: arXiv
  status: preprint
  preprint: https://arxiv.org/abs/2405.14122
  abstract: |
    Bayesian games model interactive decision-making where players have incomplete information -- e.g., regarding payoffs and private data on players' strategies and preferences -- and must actively reason and update their belief models (with regard to such information) using observation and interaction history. Existing work on counterfactual regret minimization have shown great success for games with complete or imperfect information, but not for Bayesian games. To this end, we introduced a new CFR algorithm: Bayesian-CFR and analyze its regret bound with respect to Bayesian Nash Equilibria in Bayesian games. First, we present a method for updating the posterior distribution of beliefs about the game and other players' types. The method uses a kernel-density estimate and is shown to converge to the true distribution. Second, we define Bayesian regret and present a Bayesian-CFR minimization algorithm for computing the Bayesian Nash equilibrium. Finally, we extend this new approach to other existing algorithms, such as Bayesian-CFR+ and Deep Bayesian CFR. Experimental results show that our proposed solutions significantly outperform existing methods in classical Texas Hold'em games.
- id: gao2024cooperative
  title: "Cooperative backdoor attack in decentralized reinforcement learning with theoretical guarantee"
  year: 2024
  type: conference
  author:
    - family: Gao
      given: Mengtong 
    - family: Zou
      given: Yifei 
    - family: Zhang
      given: Zuyuan
    - family: Cheng
      given: Xiuzhen  
    - family: Yu
      given: Dongxiao 
  booktitle: arXiv preprint
  venueShort: arXiv
  status: preprint
  preprint: https://arxiv.org/abs/2405.15245
  abstract: |
    The safety of decentralized reinforcement learning (RL) is a challenging problem since malicious agents can share their poisoned policies with benign agents. The paper investigates a cooperative backdoor attack in a decentralized reinforcement learning scenario. Differing from the existing methods that hide a whole backdoor attack behind their shared policies, our method decomposes the backdoor behavior into multiple components according to the state space of RL. Each malicious agent hides one component in its policy and shares its policy with the benign agents. When a benign agent learns all the poisoned policies, the backdoor attack is assembled in its policy. The theoretical proof is given to show that our cooperative method can successfully inject the backdoor into the RL policies of benign agents. Compared with the existing backdoor attacks, our cooperative method is more covert since the policy from each attacker only contains a component of the backdoor attack and is harder to detect. Extensive simulations are conducted based on Atari environments to demonstrate the efficiency and covertness of our method. To the best of our knowledge, this is the first paper presenting a provable cooperative backdoor attack in decentralized reinforcement learning.


