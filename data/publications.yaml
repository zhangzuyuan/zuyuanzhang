  abstract: |
    As an integration of digital twin and edge computing, the digital twin edge networks (DITENs) have been proposed in recent years to fill the gap between physical edge networks and digital systems. Meanwhile, the multi-access wireless environments in edge computing make it hard to provide ultra-reliable and low-latency communications for digital twin, especially when the jamming attacks can be launched by the adversaries. This paper studies the jamming-resilient physical-to-virtual communication (PTVC) problem in DITENs despite strong cooperative jamming. Note that the previous jamming models mainly focus on the jamming behaviors from an individual adversary and are restricted by the energy budget limitation and uniform jamming assumption. In this paper, we consider a more comprehensive jamming model, in which $f$ adversaries can cooperatively launch their jamming attacks in totally $k$ wireless channels with unlimited power budget and non-uniform jamming signals. Then, based on the new proposed $(k,f)$-cooperative jamming model, we show that $k>f$ is the necessary and also sufficient condition to solve the PTVC problem. On one hand, we prove that the PTVC problem is insoluble when $f\leq k$; on the other hand, two distributed algorithms are given as the solutions of the PTVC problem among $n$ physical objectives and one sink node when $k>f$, the time complexity of which are $O(\frac{n \log n}{k (\log k-\log f)})$ and $O(\frac{n \log n}{\log k-\log f})$ based on the communication modes with/without acknowledgement, respectively. Both of the theoretical results and empirical simulations are conducted to show the resilience of our algorithms despite such a strong cooperative jamming model. 
