bio:
  - I am a Ph.D. candidate in Electrical and Computer Engineering at The George Washington University. My research broadly lies at the intersection of reinforcement learning, Optimization, Game Theory, and Decision-making algorithms.
  - I am fortunate to be advised by Prof. Tian Lan and have collaborated with researchers including Prof. Vaneet Aggarwal, Prof. Mahdi Imani, and Prof. Taeyoung Lee.
  - I received my B.Eng. in Computer Science from Taishan (Honors) College, Shandong University, in 2023.
